openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:8084
  description: Generated server url
security:
- Bearer Authentication: []
paths:
  /trazabilidad/registrar:
    post:
      tags:
      - trazabilidad-controller
      summary: Registrar cambio de estado
      description: Registra un cambio de estado de un pedido. Endpoint interno llamado
        por MicroServicioPlazoleta.
      operationId: registrarCambioEstado
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrazabilidadRequest"
        required: true
      responses:
        "201":
          description: Cambio de estado registrado exitosamente
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TrazabilidadResponse"
        "400":
          description: Datos inválidos
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TrazabilidadResponse"
  /trazabilidad/restaurante/{idRestaurante}/ranking-empleados:
    get:
      tags:
      - trazabilidad-controller
      summary: Obtener ranking de empleados
      description: Muestra el ranking de empleados por tiempo medio de entrega. Solo
        puede ser ejecutado por un PROPIETARIO.
      operationId: obtenerRankingPorEmpleado
      parameters:
      - name: idRestaurante
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Ranking obtenido exitosamente
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TiempoEmpleadoResponse"
        "403":
          description: No tiene permisos para realizar esta acción
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TiempoEmpleadoResponse"
  /trazabilidad/restaurante/{idRestaurante}/eficiencia:
    get:
      tags:
      - trazabilidad-controller
      summary: Obtener eficiencia por pedido
      description: Muestra el tiempo de entrega de cada pedido del restaurante. Solo
        puede ser ejecutado por un PROPIETARIO.
      operationId: obtenerEficienciaPorPedido
      parameters:
      - name: idRestaurante
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Eficiencia obtenida exitosamente
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TiempoPedidoResponse"
        "403":
          description: No tiene permisos para realizar esta acción
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TiempoPedidoResponse"
  /trazabilidad/pedido/{idPedido}:
    get:
      tags:
      - trazabilidad-controller
      summary: Obtener trazabilidad de pedido
      description: Obtiene el historial de cambios de estado de un pedido. Puede ser
        ejecutado por CLIENTE o PROPIETARIO.
      operationId: obtenerTrazabilidadPedido
      parameters:
      - name: idPedido
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Historial obtenido exitosamente
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrazabilidadResponse"
        "404":
          description: No existe trazabilidad para el pedido
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrazabilidadResponse"
        "403":
          description: No tiene permisos para realizar esta acción
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrazabilidadResponse"
  /trazabilidad/pedido/{idPedido}/tiempo:
    get:
      tags:
      - trazabilidad-controller
      summary: Calcular tiempo de entrega
      description: Calcula el tiempo en minutos entre el estado Pendiente y Entregado
        de un pedido. Solo puede ser ejecutado por un PROPIETARIO.
      operationId: calcularTiempoEntrega
      parameters:
      - name: idPedido
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: Tiempo calculado exitosamente
          content:
            '*/*':
              schema:
                type: string
        "400":
          description: El pedido fue cancelado o aún no ha sido entregado
          content:
            '*/*':
              schema:
                type: string
        "404":
          description: No existe trazabilidad para el pedido
          content:
            '*/*':
              schema:
                type: string
        "403":
          description: No tiene permisos para realizar esta acción
          content:
            '*/*':
              schema:
                type: string
components:
  schemas:
    TrazabilidadRequest:
      type: object
      properties:
        idPedido:
          type: integer
          format: int64
        idCliente:
          type: integer
          format: int64
        idEmpleado:
          type: integer
          format: int64
        idRestaurante:
          type: integer
          format: int64
        estadoAnterior:
          type: string
        estadoNuevo:
          type: string
          minLength: 1
      required:
      - idCliente
      - idPedido
      - idRestaurante
    TrazabilidadResponse:
      type: object
      properties:
        id:
          type: string
        idPedido:
          type: integer
          format: int64
        idCliente:
          type: integer
          format: int64
        idEmpleado:
          type: integer
          format: int64
        idRestaurante:
          type: integer
          format: int64
        estadoAnterior:
          type: string
        estadoNuevo:
          type: string
        fechaCambio:
          type: string
          format: date-time
    TiempoEmpleadoResponse:
      type: object
      properties:
        idEmpleado:
          type: integer
          format: int64
        tiempoMedioMinutos:
          type: number
          format: double
    TiempoPedidoResponse:
      type: object
      properties:
        idPedido:
          type: integer
          format: int64
        minutosEntrega:
          type: integer
          format: int64
  securitySchemes:
    Bearer Authentication:
      type: http
      scheme: bearer
      bearerFormat: JWT
